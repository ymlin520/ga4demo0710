name: Update GA4/GSC Snapshot

on:
  schedule:
    - cron: '10 0 * * *'  # 每天 00:10 UTC = 08:10 台北時間
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Write service account key
        run: echo "$GA_SERVICE_ACCOUNT_JSON" > service-account.json
        env:
          GA_SERVICE_ACCOUNT_JSON: ${{ secrets.GA_SERVICE_ACCOUNT_JSON }}

      - name: Fetch latest GA4 + GSC snapshot
        run: node scripts/fetch-snapshot.js
        env:
          GA4_PROPERTY_ID: ${{ vars.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ vars.GSC_SITE_URL }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add payload.live.json
          git diff --cached --quiet || git commit -m "chore: daily GA4/GSC snapshot update"
          git push
